<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aloha ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell" id="appShell" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">ALOHA <span>ERP</span></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">--</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">--</div>
          <div class="sidebar-user-role" id="userRole">--</div>
        </div>
        <button class="sidebar-logout" id="logoutBtn" title="Đăng xuất">⏻</button>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div>
        <div class="breadcrumb" id="breadcrumb">ALOHA ERP</div>
        <h2 id="pageTitle">Tổng quan</h2>
      </div>
      <div class="topbar-right">
        <div class="center-switcher" id="centerSwitcherWrap" style="display:none;">
          <select id="centerSwitcher"></select>
        </div>
        <button class="btn btn-secondary btn-sm" id="navBack" style="display:none;">← Quay lại</button>
      </div>
    </header>

    <main class="content" id="content"></main>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast-stack" id="toastStack"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/data/permissions.js"></script>
<script src="js/seed.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/modules/notifications.js"></script>
<script src="js/modules/profile.js"></script>
<script src="js/modules/teacher.js"></script>
<script src="js/modules/center.js"></script>
<script src="js/modules/marketing.js"></script>
<script src="js/modules/accounting.js"></script>
<script src="js/modules/hr.js"></script>
<script src="js/modules/operations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
